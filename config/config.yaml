# Configuración de Entrenamiento y Modelo para Detección de Anomalías

data:
  train_path: "../data/raw/train_vibrations_normal.csv"
  test_normal_path: "../data/raw/test_vibrations_normal.csv"
  test_anomaly_path: "../data/raw/test_vibrations_anomaly.csv"
  window_size: 100
  step: 50
  sample_rate_hz: 50

model:
  in_channels: 3
  encoder_filters: [32, 64, 128]
  kernel_size: 5

training:
  batch_size: 256
  learning_rate: 0.001
  epochs: 100
  seed: 42
  validation_split: 0.2

inference:
  threshold: 0.005
  threshold_quantile: 0.995
  min_anomaly_ratio: 0.02
  severe_threshold_multiplier: 3.0

logging:
  project_name: "train-anomaly-detection"
  run_name: "run-03-large-model"

artifacts:
  model_artifact: "train-anomaly-autoencoder:latest"
  model_filename: "autoencoder_v1.pth"
